name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Validate asset configuration
        run: pnpm assets:check

      - name: Build
        run: pnpm build

      - name: Verify publishable tarballs
        run: node scripts/release-check.mjs --pack-only

      - name: Verify committed GitHub Action bundle
        run: git diff --exit-code -- .github/actions/emoji-styles-audit/dist/main.js

  react-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - react: 18.3.1
            react-dom: 18.3.1
          - react: 19.2.7
            react-dom: 19.2.7
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install React ${{ matrix.react }}
        run: pnpm --filter react-emoji-styles add --save-dev --lockfile=false react@${{ matrix.react }} react-dom@${{ matrix.react-dom }}
      - name: Build Unicode data dependency
        run: pnpm --filter emoji-styles-data build
      - run: pnpm --filter emoji-styles build
      - run: pnpm --filter react-emoji-styles test
